# UA-DETRAC competition workflow config.
# Paths are relative to the repository root unless absolute.

paths:
  dataset_yaml: config/dataset.yaml
  sample_submission: data/competition_starter/sample_submission.csv
  submission_csv: submissions/submission.csv
  test_images: data/competition_starter/data/test/images
  runs_detect_root: runs/detect
  tables_used: runs/tables_used.txt

tlc:
  project_name: ua_detrac_vehicle_detection
  dataset_name: ua_detrac_10k
  train_table_name: ua_detrac_10k-train
  val_table_name: ua_detrac_10k-val
  image_embeddings_dim: 3
  image_embeddings_reducer: umap

training:
  model: yolov8n
  run_name: yolov8n_baseline
  run_description: Baseline YOLOv8n from latest 3LC train/val revisions
  epochs: 10
  batch_size: 16
  image_size: 640
  device: 0
  workers: 2
  lr0: 0.01
  patience: 20
  use_augmentation: true
  exist_ok: true

reproducibility:
  seed: 42

predict:
  weights: null
  conf: 0.25
  iou: 0.7
  imgsz: null
  device: null
  max_det: 300
  batch: 1
  pipeline: memory
  pred_dir_name: predictions

# CPU-only override example:
